<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#71b957">
  <title>まちるだいすけと めむろたんけん</title>
  <style>
:root {
  --grass: #70b957;
  --grass-dark: #367b3f;
  --cream: #fff8df;
  --sky: #8dd8ee;
  --corn: #ffd84d;
  --ink: #263d3b;
  --white: #fff;
  --red: #e96957;
  --shadow: 0 6px 0 rgba(39, 83, 61, .16);
}

* { box-sizing: border-box; }
[hidden] { display: none !important; }

html, body { min-height: 100%; }
body {
  margin: 0;
  color: var(--ink);
  background:
    linear-gradient(105deg, transparent 0 48%, rgba(107,172,78,.07) 48% 52%, transparent 52% 100%),
    linear-gradient(#dff6ff 0 34%, #f9f3d4 34% 100%);
  font-family: "Hiragino Maru Gothic ProN", "HG丸ｺﾞｼｯｸM-PRO", "UD Digi Kyokasho NK-R", Meiryo, sans-serif;
  font-size: 18px;
  font-weight: 700;
}

.sky {
  position: fixed;
  inset: 56px 0 auto;
  height: 150px;
  z-index: -1;
  opacity: .16;
  background: linear-gradient(145deg, transparent 0 43%, #4b8d71 44% 55%, transparent 56%) 0 0 / 240px 150px repeat-x;
  clip-path: polygon(0 75%, 9% 42%, 17% 67%, 27% 25%, 39% 72%, 50% 35%, 63% 70%, 75% 18%, 87% 62%, 100% 35%, 100% 100%, 0 100%);
}

button { font: inherit; color: inherit; }
button:focus-visible, a:focus-visible { outline: 4px solid #1667c1; outline-offset: 3px; }
ruby { white-space: nowrap; ruby-align: center; }
h1, h2, p, button {
  line-break: strict;
  word-break: normal;
  word-break: keep-all;
  overflow-wrap: anywhere;
  text-wrap: pretty;
}
.skip-link { position: fixed; left: 8px; top: -60px; z-index: 99; background: #fff; padding: 10px; }
.skip-link:focus { top: 8px; }

.app-header {
  height: 64px;
  max-width: 1120px;
  margin: auto;
  padding: 8px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand { display: flex; gap: 8px; align-items: center; border: 0; background: transparent; text-align: left; cursor: pointer; line-height: 1.05; }
.brand-kicker { display: inline-block; font-size: .58rem; font-weight: 700; letter-spacing: .04em; }
.brand strong { color: var(--grass-dark); font-size: 1.12rem; font-weight: 800; }
.brand-mark { display: grid; place-items: center; width: 42px; height: 42px; overflow: hidden; background: #fff; border: 2px solid var(--corn); border-radius: 50%; box-shadow: 0 4px 0 #d9aa25; }
.brand-mark img { width: 115%; height: 115%; object-fit: contain; }
.icon-button { width: 42px; height: 42px; border: 0; border-radius: 50%; background: #fff; box-shadow: 0 4px 0 rgba(53,91,74,.17); cursor: pointer; }

main { min-height: calc(100vh - 64px); display: grid; place-items: center; padding: 8px 18px 18px; }
.screen { width: min(1080px, 100%); }
.top-screen { align-self: start; }
.hero {
  position: relative;
  display: grid;
  place-items: center;
  min-height: 230px;
  overflow: hidden;
  text-align: center;
  margin: 4px auto 14px;
  padding: 14px 28px 18px;
  border: 4px solid #fff;
  border-radius: 30px;
  box-shadow: var(--shadow);
  background:
    linear-gradient(110deg, rgba(255,255,255,.06), rgba(20,67,47,.24)),
    url("images/memuro-aerial.jpg") center 45% / cover no-repeat;
}
.hero::after {
  content: none;
}
.hero-center {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  width: fit-content;
  max-width: 92%;
  padding: 15px clamp(22px, 4vw, 42px);
  border: 1px solid rgba(255,255,255,.82);
  border-radius: 22px;
  text-align: left;
  background: linear-gradient(
    90deg,
    rgba(255,255,255,.18) 0%,
    rgba(255,255,255,.58) 23%,
    rgba(255,255,255,.66) 50%,
    rgba(255,255,255,.58) 77%,
    rgba(255,255,255,.18) 100%
  );
  box-shadow: 0 14px 34px rgba(24,52,43,.22);
  -webkit-backdrop-filter: blur(12px) saturate(1.12);
  backdrop-filter: blur(12px) saturate(1.12);
}
.hero-mascot {
  width: 116px;
  height: 116px;
  object-fit: contain;
  margin-right: clamp(14px, 3vw, 30px);
  filter: drop-shadow(0 7px 7px rgba(28,64,48,.22));
}
.eyebrow { margin: 0 0 4px; color: var(--grass-dark); font-size: .92rem; letter-spacing: .1em; }
h1 { margin: 0; line-height: 1.17; font-size: clamp(1.55rem, 4vw, 2.55rem); }
h1 span { color: inherit; }
.hero h1 {
  display: grid;
  gap: 2px;
  max-width: 760px;
  color: #245f3b;
  font-family: "Hiragino Maru Gothic ProN", "HG丸ｺﾞｼｯｸM-PRO", "UD Digi Kyokasho NK-R", Meiryo, sans-serif;
  font-size: clamp(2.45rem, 5.2vw, 3.75rem);
  line-height: 1.02;
  text-shadow: 0 1px 10px rgba(255,255,255,.92);
  font-feature-settings: "palt";
}
.hero-title-place {
  font-size: .54em;
  font-weight: 700;
  letter-spacing: .18em;
  color: #397250;
}
.hero-title-main {
  font-size: 1em;
  font-weight: 900;
  letter-spacing: .035em;
  white-space: nowrap;
}
.hero h1::after {
  content: none;
}

.level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.level-card {
  position: relative;
  min-height: 178px;
  padding: 23px 16px 16px;
  border: 3px solid rgba(255,255,255,.75);
  border-radius: 27px;
  box-shadow: var(--shadow);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform .15s, box-shadow .15s;
}
.level-icon { font-size: 2.2rem; filter: drop-shadow(0 3px 0 rgba(255,255,255,.65)); }
.level-card:hover { transform: translateY(-4px); box-shadow: 0 10px 0 rgba(39,83,61,.14); }
.level-card:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(39,83,61,.18); }
.beginner { background: #c9ed9d; }
.intermediate { background: #b8e8f4; }
.advanced { background: #ffe47a; }
.level-stamp { position: absolute; top: -12px; left: 16px; width: 45px; height: 45px; display: grid; place-items: center; border-radius: 50%; background: #fff; color: var(--grass-dark); font-size: 1.25rem; border: 3px dashed currentColor; transform: rotate(-8deg); }
.level-name { margin-top: 10px; font-size: clamp(1.3rem, 2.35vw, 1.68rem); line-height: 1.18; }
.level-sub { min-height: 1.5em; font-size: 1.08rem; margin: 5px 0 12px; }
.level-meta { margin-top: auto; padding: 8px 18px; background: rgba(255,255,255,.77); border-radius: 999px; font-size: .95rem; }
.resume-area { text-align: center; margin: -5px 0 10px; }
.resume-button { border: 0; border-radius: 999px; padding: 9px 22px; background: #fff; color: var(--grass-dark); box-shadow: 0 4px 0 rgba(39,83,61,.14); cursor: pointer; }

.quiz-screen { max-width: 900px; }
.progress-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-bottom: 5px; }
.progress-row p { margin: 0; }
#questionCounter { font-size: 1.18rem; }
#scoreChip { justify-self: end; background: var(--corn); border-radius: 999px; padding: 5px 13px; }
.back-button { justify-self: start; border: 0; background: transparent; cursor: pointer; }
.progress-track { height: 9px; overflow: hidden; background: rgba(255,255,255,.8); border-radius: 999px; margin-bottom: 9px; }
#progressBar { height: 100%; width: 4%; background: linear-gradient(90deg, var(--grass), #a6d55e); border-radius: inherit; transition: width .3s; }
.question-card { background: rgba(255,255,255,.94); border: 4px solid #fff; border-radius: 27px; padding: clamp(12px, 2vw, 20px); box-shadow: var(--shadow); }
.question-main { display: grid; grid-template-columns: 1.25fr .75fr; gap: 18px; align-items: center; min-height: 155px; }
.course-label { display: inline-block; margin: 0 0 8px; padding: 5px 11px; color: var(--grass-dark); background: #e1f4ce; border-radius: 999px; font-size: .9rem; }
#questionText {
  margin: 0;
  font-size: clamp(1.55rem, 3.5vw, 2.25rem);
  line-height: 1.5;
  transition: font-size .18s ease;
}
#questionText.is-long { font-size: clamp(1.38rem, 3vw, 1.95rem); }
#questionText.is-very-long { font-size: clamp(1.2rem, 2.6vw, 1.68rem); }
.image-frame { margin: 0; height: 155px; overflow: hidden; border-radius: 19px; background: #edf4e7; border: 3px solid #e4eecf; }
.image-frame img { width: 100%; height: 100%; object-fit: cover; transition: filter .45s ease, opacity .45s ease, transform .45s ease; }
.image-frame img.map-focus { object-position: center 8%; }
.image-frame figcaption { position: absolute; right: 6px; bottom: 5px; padding: 3px 7px; color: #fff; background: rgba(24,55,42,.78); border-radius: 999px; font-size: .58rem; }
.image-frame { position: relative; }
.image-curtain {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: grid;
  place-content: center;
  gap: 4px;
  text-align: center;
  color: var(--grass-dark);
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.85) 0 4px, transparent 5px),
    linear-gradient(145deg, #fff8c8, #dff1c9);
  transition: opacity .35s ease, transform .35s ease;
}
.image-curtain span { font-size: 2rem; }
.image-curtain strong { font-size: .82rem; line-height: 1.35; }
.image-frame.is-covered img { filter: blur(12px); opacity: .22; transform: scale(1.08); }
.image-frame.is-covered figcaption { opacity: 0; }
.image-frame.is-revealed img { animation: photoReveal .48s ease both; }
.image-frame.is-revealed .image-curtain { opacity: 0; transform: scale(.9); pointer-events: none; }
@keyframes photoReveal {
  from { opacity: .2; transform: scale(1.08); }
  to { opacity: 1; transform: scale(1); }
}
.question-main.no-image { grid-template-columns: 1fr; min-height: 115px; text-align: center; }
.choice-list { display: grid; gap: 9px; margin-top: 12px; }
.choice-button {
  width: 100%;
  min-height: 60px;
  border: 2px solid #dbe8d2;
  border-radius: 17px;
  background: #f9fff5;
  box-shadow: 0 4px 0 #d7e3d0;
  cursor: pointer;
  text-align: left;
  padding: 10px 17px;
  font-size: 1.12rem;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: transform .1s;
}
.choice-button { -webkit-tap-highlight-color: transparent; }
.choice-text {
  min-width: 0;
  line-height: 1.4;
}
.choice-button.is-long-choice { font-size: 1.02rem; }
.choice-button.is-very-long-choice { font-size: .93rem; }
@media (hover: hover) and (pointer: fine) {
  .choice-button:hover { background: #fff6c6; transform: translateY(-1px); }
}
.choice-button:active { transform: translateY(3px); box-shadow: 0 1px 0 #d7e3d0; }
.choice-button:disabled { cursor: default; }
.choice-letter { flex: 0 0 34px; width: 34px; height: 34px; display: grid; place-items: center; border-radius: 50%; color: #fff; background: var(--grass); }
.choice-button.correct { background: #dff4d1; border-color: var(--grass); }
.choice-button.wrong { background: #ffe6dd; border-color: var(--red); }
.feedback { margin: 10px auto 0; max-width: 720px; padding: 8px 16px; border-radius: 18px; background: #fff7c9; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 0 rgba(91,79,35,.13); }
.feedback-mascot {
  flex: 0 0 auto;
  width: 58px;
  height: 58px;
  object-fit: contain;
  filter: drop-shadow(0 3px 0 rgba(39,83,61,.13));
}
.feedback strong { color: var(--grass-dark); }
.feedback p { margin: 2px 0 0; font-size: .98rem; font-weight: 600; line-height: 1.5; }
.feedback strong { font-size: 1.08rem; }

.result-screen { max-width: 680px; text-align: center; }
.result-card { background: rgba(255,255,255,.95); border: 5px solid var(--corn); border-radius: 30px; padding: 22px; box-shadow: var(--shadow); }
.result-card.fail { border-color: var(--sky); }
.result-seal { width: 75px; height: 75px; display: grid; place-items: center; margin: -4px auto 5px; border: 4px dashed var(--grass); border-radius: 50%; font-size: 2.7rem; }
.result-card h2 { margin: 4px 0; font-size: clamp(1.7rem, 5vw, 2.65rem); color: var(--grass-dark); }
.score-display { display: flex; justify-content: center; align-items: baseline; gap: 7px; }
.score-display strong { font-size: 4rem; line-height: 1; color: #e09b00; }
#resultSummary { margin: 8px 0; }
.certificate { max-width: 470px; margin: 12px auto; padding: 11px; border: 5px double #d6a81d; background: #fffdf1; display: grid; gap: 5px; }
.certificate p { margin: 0; letter-spacing: .25em; }
.certificate strong { font-size: 1.2rem; }
.certificate span { font-size: .8rem; font-weight: 600; }
.result-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 9px; margin-top: 14px; }
.primary-button, .secondary-button { min-height: 45px; border-radius: 14px; padding: 9px 18px; cursor: pointer; }
.primary-button { border: 0; color: #fff; background: var(--grass-dark); box-shadow: 0 4px 0 #225329; }
.secondary-button { border: 2px solid #bdd0b7; background: #fff; }

footer { min-height: 30px; text-align: center; font-size: .72rem; color: #58705e; }
ruby { ruby-align: center; }
rt { font-size: .5em; font-weight: 700; color: #315f44; }

@media (max-width: 700px) {
  .app-header { height: 56px; padding: 6px 12px; }
  main { min-height: calc(100vh - 80px); padding: 5px 10px 12px; }
  .brand { font-size: .75rem; }
  .brand-mark, .icon-button { width: 37px; height: 37px; }
  .hero { margin-bottom: 10px; min-height: 205px; padding: 10px 16px 15px; }
  .hero-center { width: fit-content; max-width: 92%; padding: 12px 22px; }
  .hero-mascot { width: 96px; height: 96px; }
  .hero h1 { font-size: clamp(2.15rem, 7vw, 3rem); }
  .level-grid { gap: 8px; }
  .level-card { min-height: 145px; padding: 20px 7px 10px; border-radius: 20px; }
  .level-icon { font-size: 1.75rem; }
  .level-stamp { width: 36px; height: 36px; top: -7px; }
  .level-sub { font-size: .9rem; }
  .level-meta { font-size: .78rem; }
  .question-main { min-height: 120px; grid-template-columns: 1.3fr .7fr; gap: 9px; }
  .image-frame { height: 120px; border-radius: 13px; }
  .choice-list { gap: 7px; margin-top: 8px; }
  .choice-button { min-height: 54px; padding: 7px 11px; font-size: 1rem; }
  .feedback { margin-top: 7px; padding: 6px 10px; }
}

@media (max-width: 470px) {
  .hero { min-height: 175px; padding: 7px 10px 12px; }
  .hero-center { width: 94%; padding: 10px 14px; border-radius: 17px; }
  .hero-mascot { width: 74px; height: 74px; margin-right: 10px; }
  .hero h1 { font-size: clamp(1.7rem, 8vw, 2.15rem); line-height: 1.06; letter-spacing: .02em; }
  .level-grid { grid-template-columns: 1fr; }
  .level-card { min-height: 92px; padding: 12px 12px 10px 60px; align-items: flex-start; justify-content: center; }
  .level-icon { position: absolute; left: 16px; bottom: 12px; font-size: 1.65rem; }
  .level-stamp { left: 12px; top: 25px; }
  .level-name { margin-top: 0; font-size: 1.22rem; }
  .level-sub { margin: 2px 0 4px; }
  .level-meta { position: absolute; right: 9px; bottom: 9px; padding: 5px 9px; }
  .question-main { grid-template-columns: 1fr; min-height: auto; text-align: center; }
  .image-frame { height: 105px; }
  #questionText { min-height: 58px; }
  .feedback p { display: none; }
}

@media (max-height: 650px) and (min-width: 600px) {
  .app-header { height: 50px; }
  main { min-height: calc(100vh - 70px); padding-top: 2px; }
  .hero { margin: 0 auto 8px; }
  .hero { min-height: 180px; }
  .hero-mascot { width: 88px; height: 88px; }
  .hero h1 { font-size: 2.35rem; }
  .level-card { min-height: 130px; }
  .question-main { min-height: 110px; }
  .image-frame { height: 110px; }
  .choice-button { min-height: 50px; font-size: 1rem; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
  .image-frame.is-revealed img { animation: none !important; }
}

</style>
</head>
<body>
  <a class="skip-link" href="#main">メインへ いどう</a>
  <div class="sky" aria-hidden="true"></div>

  <header class="app-header">
    <button id="homeButton" class="brand" type="button" aria-label="トップに もどる">
      <span class="brand-mark"><img src="images/machiru-front.png" alt=""></span>
      <span><small class="brand-kicker">まちるだいすけ と</small><br><strong>めむろたんけん</strong></span>
    </button>
    <button id="soundButton" class="icon-button" type="button" aria-pressed="true" aria-label="こうかおんを きる">♪</button>
  </header>

  <main id="main">
    <section id="topScreen" class="screen top-screen">
      <div class="hero">
        <div class="hero-center">
          <img class="hero-mascot" src="images/machiru-wave.png" alt="手を上げる まちるだいすけ">
          <h1>
            <span class="hero-title-main">めむろ<ruby>検定<rt>けんてい</rt></ruby></span>
          </h1>
        </div>
      </div>

      <div id="resumeArea" class="resume-area" hidden>
        <button id="resumeButton" class="resume-button" type="button">前のつづきから</button>
      </div>

      <div class="level-grid" aria-label="コースをえらぶ">
        <button class="level-card beginner" type="button" data-level="beginner">
          <span class="level-stamp">1</span>
          <span class="level-icon" aria-hidden="true">🗺️</span>
          <span class="level-name">まちたんけん</span>
          <span class="level-sub">ビギナー級</span>
          <span class="level-meta">全25問　▶</span>
        </button>
        <button class="level-card intermediate" type="button" data-level="intermediate">
          <span class="level-stamp">2</span>
          <span class="level-icon" aria-hidden="true">🚜</span>
          <span class="level-name">くらし・しごとたんけん</span>
          <span class="level-sub">中級</span>
          <span class="level-meta">全25問　▶</span>
        </button>
        <button class="level-card advanced" type="button" data-level="advanced">
          <span class="level-stamp">3</span>
          <span class="level-icon" aria-hidden="true">🏑</span>
          <span class="level-name">れきし・文化たんけん</span>
          <span class="level-sub">上級</span>
          <span class="level-meta">全25問　▶</span>
        </button>
      </div>

    </section>

    <section id="quizScreen" class="screen quiz-screen" hidden>
      <div class="progress-row">
        <button id="quitButton" class="back-button" type="button">‹ やめる</button>
        <p id="questionCounter" aria-live="polite">第1問 / 25問</p>
        <p id="scoreChip">★ 0</p>
      </div>
      <div class="progress-track" role="progressbar" aria-label="クイズの進み具合" aria-valuemin="0" aria-valuemax="25" aria-valuenow="1">
        <div id="progressBar"></div>
      </div>

      <article class="question-card">
        <div class="question-main">
          <div>
            <p id="levelLabel" class="course-label"></p>
            <h2 id="questionText"></h2>
          </div>
          <figure id="imageFrame" class="image-frame">
            <img id="questionImage" alt="">
            <figcaption id="imageCredit">写真：地域学習書「めむろ学」</figcaption>
            <div id="imageCurtain" class="image-curtain" aria-hidden="true">
              <span>🔍</span>
              <strong>こたえの あとで<br>しゃしんが ひらくよ</strong>
            </div>
          </figure>
        </div>
        <div id="choiceList" class="choice-list" role="group" aria-label="答えをえらぶ"></div>
      </article>

      <div id="feedback" class="feedback" role="status" aria-live="assertive" hidden>
        <img id="feedbackMascot" class="feedback-mascot" src="images/machiru-wave.png" alt="">
        <div>
          <strong id="feedbackTitle"></strong>
          <p id="feedbackText"></p>
        </div>
      </div>
    </section>

    <section id="resultScreen" class="screen result-screen" hidden>
      <div id="resultCard" class="result-card">
        <div id="resultSeal" class="result-seal" aria-hidden="true">🌽</div>
        <p id="resultKicker" class="eyebrow"></p>
        <h2 id="resultTitle"></h2>
        <div class="score-display"><strong id="resultScore">0</strong><span>/ 25点</span></div>
        <p id="resultSummary"></p>
        <div id="certificate" class="certificate" hidden>
          <p>認 定 証</p>
          <strong id="certificateCourse"></strong>
          <span>芽室町のことをよく学び、全問正解したことを認定します。</span>
        </div>
        <div class="result-actions">
          <button id="retryButton" class="primary-button" type="button">もう一度挑戦</button>
          <button id="reviewButton" class="secondary-button" type="button">まちがい復習</button>
          <button id="resultHomeButton" class="secondary-button" type="button">トップに戻る</button>
        </div>
      </div>
    </section>

  </main>

  <script>

function normalizeKidHtml(html) {

function applyKidText(root = document.body) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const targets = [];
  while (walker.nextNode()) {
    const node = walker.currentNode;

    const text = node.nodeValue.trim();
    if (!text || !parent || ["SCRIPT", "STYLE", "RT"].includes(parent.tagName)) continue;

const STORAGE_KEY = "memuro-tanken-progress-v1";
const screens = [...document.querySelectorAll(".screen")];
const $ = (id) => document.getElementById(id);

let state = {
  level: null,
  queue: [],
  index: 0,
  score: 0,
  wrong: [],
  reviewMode: false,
  sound: true,
  locked: false,
  currentChoices: []
};

function getLevelQuestions(level) {
  return questions.filter((item) => item.level === level);
}

// 将来ランダム出題にする場合は、この関数の返り値をシャッフルします。
function buildQuestionQueue(level) {
  return getLevelQuestions(level).map((item) => questions.indexOf(item));
}

function shuffleChoices(item) {
  const choices = item.choices.map((text, originalIndex) => ({ text, originalIndex }));
  for (let index = choices.length - 1; index > 0; index -= 1) {
    const randomIndex = Math.floor(Math.random() * (index + 1));
    [choices[index], choices[randomIndex]] = [choices[randomIndex], choices[index]];
  }
  const unchanged = choices.every((choice, index) => choice.originalIndex === index);
  if (unchanged) [choices[0], choices[1]] = [choices[1], choices[0]];
  return choices;
}

function showScreen(id) {
  screens.forEach((screen) => { screen.hidden = screen.id !== id; });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function startQuiz(level, queue = buildQuestionQueue(level), reviewMode = false) {
  state = { ...state, level, queue, index: 0, score: 0, wrong: [], reviewMode, locked: false, currentChoices: [] };
  showScreen("quizScreen");
  renderQuestion();
  saveProgress();
}

function renderQuestion() {
  const item = questions[state.queue[state.index]];
  const total = state.queue.length;
  const displayTotal = state.reviewMode ? total : 25;
  $("questionCounter").innerHTML = `<ruby>第<rt>だい</rt></ruby>${state.index + 1}<ruby>問<rt>もん</rt></ruby> / ${displayTotal}<ruby>問<rt>もん</rt></ruby>`;
  $("scoreChip").textContent = `★ ${state.score}`;
  $("levelLabel").innerHTML = `${kidHtml(levelInfo[state.level].name)}（${kidHtml(levelInfo[state.level].label)}）${state.reviewMode ? `・${kidHtml("復習")}` : ""}`;
  const questionElement = $("questionText");
  setKidHtml(questionElement, item.question);
  questionElement.classList.toggle("is-long", item.question.length >= 22);
  questionElement.classList.toggle("is-very-long", item.question.length >= 32);
  $("progressBar").style.width = `${((state.index + 1) / total) * 100}%`;
  document.querySelector(".progress-track").setAttribute("aria-valuemax", total);
  document.querySelector(".progress-track").setAttribute("aria-valuenow", state.index + 1);
  $("feedback").hidden = true;
  state.locked = false;
  state.currentChoices = shuffleChoices(item);

  const main = document.querySelector(".question-main");
  if (item.image) {
    main.classList.remove("no-image");
    $("imageFrame").hidden = false;
    $("imageFrame").classList.add("is-covered");
    $("imageFrame").classList.remove("is-revealed");
    $("questionImage").src = `images/${item.image}`;
    $("questionImage").classList.toggle("map-focus", item.image === "memuro-map.jpg");
    $("questionImage").alt = "もんだいの てがかりになる しゃしん";
    setKidHtml($("imageCredit"), imageCredits[item.image] || "写真：地域学習書「めむろ学」");
    $("questionImage").onerror = () => {
      $("questionImage").onerror = null;
      $("questionImage").src = "images/placeholder.jpg";
      $("questionImage").alt = "めむろちょうの はたけと ひだかさんみゃくの イメージ（しゃしん じゅんびちゅう）";
      setKidHtml($("imageCredit"), "写真準備中");
    };
  } else {
    main.classList.add("no-image");
    $("imageFrame").hidden = true;
    $("imageFrame").classList.remove("is-covered", "is-revealed");
    $("questionImage").classList.remove("map-focus");
    $("questionImage").removeAttribute("src");
  }

  $("choiceList").replaceChildren(...state.currentChoices.map((choice, index) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "choice-button";
    button.classList.toggle("is-long-choice", choice.text.length >= 14);
    button.classList.toggle("is-very-long-choice", choice.text.length >= 22);
    button.innerHTML = `<span class="choice-letter">${String.fromCharCode(65 + index)}</span><span class="choice-text">${kidHtml(choice.text)}</span>`;
    button.addEventListener("click", () => chooseAnswer(index));
    return button;
  }));
}

function chooseAnswer(selected) {
  if (state.locked) return;
  state.locked = true;
  const item = questions[state.queue[state.index]];
  const correct = state.currentChoices[selected].originalIndex === item.answer;
  const buttons = [...document.querySelectorAll(".choice-button")];
  buttons.forEach((button, index) => {
    button.disabled = true;
    if (state.currentChoices[index].originalIndex === item.answer) button.classList.add("correct");
    if (index === selected && !correct) button.classList.add("wrong");
  });
  if (item.image) {
    $("imageFrame").classList.remove("is-covered");
    $("imageFrame").classList.add("is-revealed");
  }

  if (correct) {
    state.score += 1;
    if ($("feedbackMascot")) $("feedbackMascot").src = "images/machiru-wave.png";
    setKidHtml($("feedbackTitle"), ["やったね！", "すごい！", "いい調子！"][state.index % 3]);
    playTone(660);
  } else {
    state.wrong.push(state.queue[state.index]);
    if ($("feedbackMascot")) $("feedbackMascot").src = "images/machiru-front.png";
    setKidHtml($("feedbackTitle"), ["次はいけるよ！", "だいじょうぶ、発見できたね！"][state.index % 2]);
    playTone(330);
  }
  $("scoreChip").textContent = `★ ${state.score}`;
  $("feedbackText").innerHTML = `${kidHtml(item.explanation)}（${kidHtml(item.source)}）`;
  $("feedback").hidden = false;
  setTimeout(nextQuestion, 1800);
}

function nextQuestion() {
  state.index += 1;
  if (state.index < state.queue.length) {
    renderQuestion();
    saveProgress();
  } else {
    showResult();
  }
}

function showResult() {
  localStorage.removeItem(STORAGE_KEY);
  updateResumeButton();
  showScreen("resultScreen");
  const total = state.queue.length;
  const passed = !state.reviewMode && total === 25 && state.score === 25;
  $("resultCard").classList.toggle("fail", !passed);
  $("resultScore").textContent = state.score;
  document.querySelector(".score-display span").innerHTML = `/ ${total}<ruby>点<rt>てん</rt></ruby>`;
  $("resultKicker").innerHTML = `${kidHtml(levelInfo[state.level].name)}（${kidHtml(levelInfo[state.level].label)}）`;
  setKidHtml($("resultTitle"), passed ? "たんけんクリア！" : state.reviewMode ? "復習できたね！" : "もう一回チャレンジ！");
  $("resultSummary").textContent = passed
    ? "25もん すべてせいかい！ めむろちょうの たんけんめいじんです。"
    : `${total}もんちゅう ${state.score}もんせいかい。まちがいも、あたらしいはっけんへのいっぽだよ。`;
  $("certificate").hidden = !passed;
  $("certificateCourse").innerHTML = `${kidHtml(levelInfo[state.level].name)} ${kidHtml(levelInfo[state.level].label)}`;
  $("reviewButton").hidden = state.wrong.length === 0;
  $("reviewButton").textContent = `まちがいふくしゅう（${state.wrong.length}もん）`;
  playTone(passed ? 880 : 440);
}

function saveProgress() {
  if (!state.level || state.reviewMode) return;
  const saved = {
    level: state.level, queue: state.queue, index: state.index,
    score: state.score, wrong: state.wrong
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  updateResumeButton();
}

function loadProgress() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!saved || !levelInfo[saved.level] || saved.index >= saved.queue.length) return;
    state = { ...state, ...saved, reviewMode: false, locked: false };
    showScreen("quizScreen");
    renderQuestion();
  } catch {
    localStorage.removeItem(STORAGE_KEY);
  }
}

function updateResumeButton() {
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { /* 破損時は非表示 */ }
  $("resumeArea").hidden = !saved;
  if (saved && levelInfo[saved.level]) {
    $("resumeButton").innerHTML = `${kidHtml(levelInfo[saved.level].name)} <ruby>第<rt>だい</rt></ruby>${saved.index + 1}<ruby>問<rt>もん</rt></ruby>から`;
  }
}

function goHome() {
  showScreen("topScreen");
  updateResumeButton();
}

function confirmQuit() {
  if (window.confirm("ここまでの きろくを のこして、トップに もどりますか？")) goHome();
}

function playTone(frequency) {
  if (!state.sound || !window.AudioContext) return;
  const context = new AudioContext();
  const oscillator = context.createOscillator();
  const gain = context.createGain();
  oscillator.frequency.value = frequency;
  gain.gain.setValueAtTime(0.05, context.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, context.currentTime + 0.12);
  oscillator.connect(gain).connect(context.destination);
  oscillator.start();
  oscillator.stop(context.currentTime + 0.12);
}

document.querySelectorAll(".level-card").forEach((button) => {
  button.addEventListener("click", () => {
    localStorage.removeItem(STORAGE_KEY);
    startQuiz(button.dataset.level);
  });
});
$("resumeButton").addEventListener("click", loadProgress);
$("quitButton").addEventListener("click", confirmQuit);
$("homeButton").addEventListener("click", goHome);
$("resultHomeButton").addEventListener("click", goHome);
$("retryButton").addEventListener("click", () => startQuiz(state.level));
$("reviewButton").addEventListener("click", () => startQuiz(state.level, [...new Set(state.wrong)], true));
$("soundButton").addEventListener("click", () => {
  state.sound = !state.sound;
  $("soundButton").setAttribute("aria-pressed", String(state.sound));
  $("soundButton").setAttribute("aria-label", state.sound ? "こうかおんを きる" : "こうかおんを つける");
  $("soundButton").textContent = state.sound ? "♪" : "×";
});

updateResumeButton();
applyKidText();

</script>
</body>
</html>
